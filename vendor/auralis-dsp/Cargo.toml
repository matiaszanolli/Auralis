[package]
name = "auralis-dsp"
version = "0.1.0"
edition = "2021"

[dependencies]
ndarray = "0.16"
num-complex = "0.4"
rayon = "1.7"
rustfft = "6.1"
realfft = "3.3"
pyo3 = { version = "0.23", features = ["extension-module"] }
numpy = "0.23"

[lib]
name = "auralis_dsp"
crate-type = ["cdylib", "rlib"]  # Build as Python extension + Rust library

[dev-dependencies]
criterion = "0.5"
