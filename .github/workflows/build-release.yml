name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.1-beta.2)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" =~ (beta|alpha|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 libffi-dev libasound2-dev libportaudio2 portaudio19-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel maturin
          pip install -r requirements.txt

      - name: Build Rust DSP module
        run: |
          cd vendor/auralis-dsp
          maturin build --release
          pip install target/wheels/*.whl
        env:
          # pyo3 0.23's abi3 feature caps at Python 3.13; this opts into
          # trusting it against 3.14 (matches the last known-working workflow).
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

      - name: Build frontend
        run: |
          cd auralis-web/frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare desktop resources (frontend + auralis core)
        run: |
          mkdir -p desktop/resources/frontend desktop/resources/auralis
          rsync -a --delete auralis-web/frontend/dist/ desktop/resources/frontend/
          rsync -a --delete auralis/ desktop/resources/auralis/ \
            --exclude='__pycache__' --exclude='*.pyc'

      - name: Build backend with PyInstaller
        run: |
          pip install pyinstaller
          cd auralis-web/backend
          pyinstaller --clean --noconfirm auralis-backend.spec

      - name: Copy backend executable into desktop resources
        run: |
          mkdir -p desktop/resources/backend
          cp auralis-web/backend/dist/auralis-backend desktop/resources/backend/

      - name: Build Electron app (Linux)
        run: |
          cd desktop
          pnpm install --frozen-lockfile
          pnpm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

      # Best-effort: Flatpak is a newer, less-battle-tested target here than
      # AppImage/deb, so a failure must never block those (or the release).
      - name: Install flatpak-builder
        continue-on-error: true
        id: flatpak_deps
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          # --user: the runner account can't do system-wide Flatpak config
          # (ConfigureRemote requires polkit privileges it doesn't have), and
          # @malept/flatpak-bundler itself installs the runtime/sdk/base refs
          # at --user scope too, so this must match.
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Electron app (Linux, Flatpak)
        if: steps.flatpak_deps.outcome == 'success'
        continue-on-error: true
        run: |
          cd desktop
          pnpm run build:linux:flatpak
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: dist/*.flatpak
          retention-days: 30
          if-no-files-found: warn

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel maturin
          pip install -r requirements.txt

      - name: Build Rust DSP module
        shell: pwsh
        run: |
          cd vendor/auralis-dsp
          maturin build --release
          $wheel = Get-ChildItem target/wheels/*.whl | Select-Object -First 1
          pip install $wheel.FullName
        env:
          # pyo3 0.23's abi3 feature caps at Python 3.13; this opts into
          # trusting it against 3.14 (matches the last known-working workflow).
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

      - name: Build frontend
        run: |
          cd auralis-web/frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare desktop resources (frontend + auralis core)
        shell: pwsh
        run: |
          # Sync frontend
          if (Test-Path desktop/resources/frontend) { Remove-Item -Recurse -Force desktop/resources/frontend }
          Copy-Item -Recurse auralis-web/frontend/dist desktop/resources/frontend

          # Sync auralis core
          if (Test-Path desktop/resources/auralis) { Remove-Item -Recurse -Force desktop/resources/auralis }
          Copy-Item -Recurse auralis desktop/resources/auralis
          Get-ChildItem -Recurse desktop/resources/auralis -Include __pycache__,*.pyc | Remove-Item -Recurse -Force

      - name: Build backend with PyInstaller
        shell: pwsh
        run: |
          pip install pyinstaller
          Set-Location auralis-web/backend
          pyinstaller --clean --noconfirm auralis-backend.spec

      - name: Copy backend executable into desktop resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/resources/backend
          Copy-Item -Force auralis-web/backend/dist/auralis-backend.exe desktop/resources/backend/

      - name: Build Electron app (Windows)
        run: |
          cd desktop
          pnpm install --frozen-lockfile
          pnpm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: brew install protobuf libsndfile portaudio

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel maturin
          pip install -r requirements.txt

      - name: Build Rust DSP module
        run: |
          cd vendor/auralis-dsp
          maturin build --release
          pip install target/wheels/*.whl
        env:
          # pyo3 0.23's abi3 feature caps at Python 3.13; this opts into
          # trusting it against 3.14 (matches the last known-working workflow).
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

      - name: Build frontend
        run: |
          cd auralis-web/frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Prepare desktop resources (frontend + auralis core)
        run: |
          mkdir -p desktop/resources/frontend desktop/resources/auralis
          rsync -a --delete auralis-web/frontend/dist/ desktop/resources/frontend/
          rsync -a --delete auralis/ desktop/resources/auralis/ \
            --exclude='__pycache__' --exclude='*.pyc'

      - name: Build backend with PyInstaller
        run: |
          pip install pyinstaller
          cd auralis-web/backend
          pyinstaller --clean --noconfirm auralis-backend.spec

      - name: Copy backend executable into desktop resources
        run: |
          mkdir -p desktop/resources/backend
          cp auralis-web/backend/dist/auralis-backend desktop/resources/backend/

      - name: Build Electron app (macOS)
        run: |
          cd desktop
          pnpm install --frozen-lockfile
          pnpm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            dist/*.dmg
          retention-days: 30

  create-release:
    needs: [prepare, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Display artifacts
        run: find ./artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Auralis v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.flatpak
            artifacts/*.exe
            artifacts/*.dmg
